services:
  - type: web
    name: pixelart-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STABILITY_API_KEY
        sync: false   # set this manually in the Render dashboard once you have a key
    plan: free

  - type: web
    name: pixelart-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://pixelart-backend.onrender.com   # update if Render gives a different URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
